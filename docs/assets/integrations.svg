<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" fill="none">
  <rect width="880" height="280" rx="12" fill="#0f172a"/>
  <text x="440" y="32" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Integrations Hub</text>

  <!-- Center -->
  <rect x="340" y="90" width="200" height="90" rx="14" fill="#2563eb"/>
  <text x="440" y="125" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">AutoAce Tickets</text>
  <text x="440" y="148" text-anchor="middle" fill="#bfdbfe" font-family="system-ui" font-size="11">API + Webhooks</text>
  <text x="440" y="166" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="10">Event-driven</text>

  <!-- Linear -->
  <rect x="40" y="70" width="140" height="130" rx="12" fill="#1e1b4b" stroke="#6366f1"/>
  <text x="110" y="105" text-anchor="middle" fill="#e0e7ff" font-family="system-ui" font-size="13" font-weight="600">Linear</text>
  <text x="110" y="128" text-anchor="middle" fill="#a5b4fc" font-family="system-ui" font-size="10">Triaged ’ AUT-xxx</text>
  <text x="110" y="148" text-anchor="middle" fill="#a5b4fc" font-family="system-ui" font-size="10">Webhook sync back</text>
  <text x="110" y="175" text-anchor="middle" fill="#818cf8" font-family="system-ui" font-size="9">LINEAR_TEAM_ID=AUT</text>
  <path d="M180 135 L335 135" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Slack -->
  <rect x="700" y="50" width="140" height="80" rx="12" fill="#14532d" stroke="#22c55e"/>
  <text x="770" y="85" text-anchor="middle" fill="#dcfce7" font-family="system-ui" font-size="13" font-weight="600">Slack</text>
  <text x="770" y="108" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="10">P1/P2 · Assign · SLA</text>
  <path d="M540 120 L695 90" stroke="#22c55e" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Resend -->
  <rect x="700" y="150" width="140" height="80" rx="12" fill="#431407" stroke="#f97316"/>
  <text x="770" y="185" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="13" font-weight="600">Resend</text>
  <text x="770" y="208" text-anchor="middle" fill="#fdba74" font-family="system-ui" font-size="10">Confirm · Status · Assign</text>
  <path d="M540 150 L695 190" stroke="#f97316" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Cron -->
  <rect x="40" y="220" width="140" height="50" rx="10" fill="#312e81" stroke="#818cf8"/>
  <text x="110" y="250" text-anchor="middle" fill="#e0e7ff" font-family="system-ui" font-size="12" font-weight="600">Railway Cron</text>
  <path d="M180 245 L335 175" stroke="#818cf8" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Storage -->
  <rect x="220" y="220" width="140" height="50" rx="10" fill="#164e63" stroke="#22d3ee"/>
  <text x="290" y="250" text-anchor="middle" fill="#cffafe" font-family="system-ui" font-size="12" font-weight="600">Supabase Storage</text>
  <path d="M360 245 L400 180" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6 4"/>

  <text x="440" y="268" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">All integrations optional  enable via env vars</text>
</svg>
