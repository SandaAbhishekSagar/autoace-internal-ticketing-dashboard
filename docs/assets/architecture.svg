<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="920" height="420" rx="16" fill="url(#bg)"/>
  <text x="460" y="36" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="20" font-weight="700">System Architecture</text>

  <!-- Users -->
  <g filter="url(#shadow)">
    <rect x="40" y="70" width="160" height="100" rx="12" fill="#334155" stroke="#64748b"/>
    <text x="120" y="100" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="13" font-weight="600">Submitters</text>
    <text x="120" y="122" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">Customers À Vendors</text>
    <text x="120" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">Call monitors</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="200" width="160" height="100" rx="12" fill="#334155" stroke="#64748b"/>
    <text x="120" y="230" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="13" font-weight="600">Internal team</text>
    <text x="120" y="252" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">Operators À Engineers</text>
    <text x="120" y="270" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">Admins</text>
  </g>

  <!-- App -->
  <g filter="url(#shadow)">
    <rect x="280" y="120" width="200" height="140" rx="14" fill="#2563eb" stroke="#3b82f6"/>
    <text x="380" y="155" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="15" font-weight="700">Next.js 14</text>
    <text x="380" y="178" text-anchor="middle" fill="#dbeafe" font-family="system-ui" font-size="12">App + API Routes</text>
    <text x="380" y="200" text-anchor="middle" fill="#bfdbfe" font-family="system-ui" font-size="11">RBAC À SLA À Webhooks</text>
    <text x="380" y="220" text-anchor="middle" fill="#bfdbfe" font-family="system-ui" font-size="11">Prisma ORM</text>
  </g>

  <!-- Supabase -->
  <g filter="url(#shadow)">
    <rect x="560" y="70" width="150" height="80" rx="12" fill="#14532d" stroke="#22c55e"/>
    <text x="635" y="100" text-anchor="middle" fill="#dcfce7" font-family="system-ui" font-size="13" font-weight="600">Supabase</text>
    <text x="635" y="120" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="11">Auth À Postgres</text>
    <text x="635" y="136" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="11">Storage</text>
  </g>

  <!-- Railway -->
  <g filter="url(#shadow)">
    <rect x="560" y="170" width="150" height="60" rx="12" fill="#431407" stroke="#f97316"/>
    <text x="635" y="198" text-anchor="middle" fill="#ffedd5" font-family="system-ui" font-size="13" font-weight="600">Railway</text>
    <text x="635" y="218" text-anchor="middle" fill="#fdba74" font-family="system-ui" font-size="11">Deploy À Cron</text>
  </g>

  <!-- Integrations -->
  <g filter="url(#shadow)">
    <rect x="560" y="260" width="320" height="120" rx="12" fill="#312e81" stroke="#6366f1"/>
    <text x="720" y="290" text-anchor="middle" fill="#e0e7ff" font-family="system-ui" font-size="13" font-weight="600">Integrations (optional)</text>
    <text x="620" y="320" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="11">Linear</text>
    <text x="720" y="320" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="11">Slack</text>
    <text x="820" y="320" text-anchor="middle" fill="#c7d2fe" font-family="system-ui" font-size="11">Resend</text>
    <text x="670" y="350" text-anchor="middle" fill="#a5b4fc" font-family="system-ui" font-size="10">Issue sync À Alerts À Email</text>
  </g>

  <!-- Arrows -->
  <path d="M200 120 L275 165" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M200 250 L275 195" stroke="#64748b" stroke-width="2"/>
  <path d="M480 170 L555 110" stroke="#64748b" stroke-width="2"/>
  <path d="M480 190 L555 200" stroke="#64748b" stroke-width="2"/>
  <path d="M480 220 L555 290" stroke="#64748b" stroke-width="2"/>

  <text x="460" y="400" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">Hosted on Railway À Data on Supabase À Engineers stay in control</text>
</svg>
